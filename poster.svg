  <text class="testo-tracciato">
    <textPath href="#tracciato" text-anchor="start" startOffset="0%">
      Treno in ritardo, non sentirmi inclusa nei gruppi, compilare moduli infiniti, rivedere gli stessi film, fare qualcosa di obbligato, vivere passivamente, viaggi in pullman, code infinite, burocrazia, lavoretti domestici, non capire il coding, fare calcoli a mente, rimuginare sulle cose, overthinking, avere l'ansia, non saper stare nella folla, passare ore sui social, oziare sul divano, file infinite in posta,  domande come: hai il fidanzato?, stare ore al pc, avere il blocco dell'artista, essere incapace, la rimpatriata di classe delle medie, auguri stereotipati per le festività, Resto a disposizione per eventuali chiarimenti, essere ghostata...                                          Treno in ritardo, non sentirmi inclusa nei gruppi, compilare moduli infiniti, rivedere gli stessi film, fare qualcosa di obbligato, vivere passivamente, viaggi in pullman, code infinite, burocrazia, lavoretti domestici, non capire il coding, fare calcoli a mente, rimuginare sulle cose, overthinking, avere l'ansia, non saper stare nella folla, passare ore sui social, oziare sul divano, file infinite in posta,  domande come: hai il fidanzato?, stare ore al pc, avere il blocco dell'artista, essere incapace, la rimpatriata di classe delle medie, auguri stereotipati per le festività, Resto a disposizione per eventuali chiarimenti, essere ghostata...
    </textPath>
  </text>
  <script><![CDATA[
    var tp = document.querySelector('.testo-tracciato textPath');
    var offset = 0;
    function anima() {
      offset -= 0.008;
      if (offset < -100) offset = 0;
      tp.setAttribute('startOffset', offset + '%');
      requestAnimationFrame(anima);
    }
    anima();

    var wrapper = document.getElementById('sole-wrapper');
    var svgRoot = document.querySelector('svg');
    var dragging = false, moved = false, startX, startY, dx = 0, dy = 0, scale = 1;
    function aggiornaTrasforma() {
      wrapper.setAttribute('transform', 'translate(110,1100) translate(' + dx + ',' + dy + ') scale(' + scale + ') translate(-110,-1100)');
    }
    wrapper.addEventListener('mousedown', function (e) {
      dragging = true;
      moved = false;
      startX = e.clientX;
      startY = e.clientY;
    });
    document.addEventListener('mousemove', function (e) {
      if (!dragging) return;
      if (Math.abs(e.clientX - startX) > 3 || Math.abs(e.clientY - startY) > 3) moved = true;
      dx += e.clientX - startX;
      dy += e.clientY - startY;
      startX = e.clientX;
      startY = e.clientY;
      aggiornaTrasforma();
    });
    document.addEventListener('mouseup', function () {
      if (!moved) {
        svgRoot.classList.toggle('negativo');
      }
      dragging = false;
    });
    wrapper.addEventListener('wheel', function (e) {
      e.preventDefault();
      scale += e.deltaY * -0.002;
      scale = Math.min(Math.max(scale, 0.3), 3);
      aggiornaTrasforma();
    });

    var subTesto = document.getElementById('sottotesto');
    var subWrap = document.getElementById('sottotitolo-wrapper');
    var subScale = 1;
    subWrap.addEventListener('wheel', function (e) {
      e.preventDefault();
      subScale += e.deltaY * -0.003;
      subScale = Math.min(Math.max(subScale, 0.3), 5);
      subTesto.setAttribute('transform', 'translate(679.31,51.12) scale(' + subScale + ')');
    });
  ]]></script>
</svg>